<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/script.js" Defer></script> 
    <title>Desconto na renda</title>
</head>
<body>
    <div id="geral">
        <h3> Decsonto nas rendas</h3>

        <p>São insentos as pessoas menores de idade e com renda abaixo de R$ 1700,00</p>
        <P> Até R$ 5000,00 o desonto será de 5%</P>
        <p> De R$ 5001,00 até R$ 8000,00 o desconto será de 8%</p>
        <p> De R$ 8001,00 até R$ 10000,00 o desconto será de 10%</p>
        <P> De R$ 100001,00 será de 3%</P>
        <div id="div-form">
            <form>
                <label for="nome">Nome</label>
                <input type="text" nme="nome" id="nome">
                
                <label for="idade">Idade</label>
                <input type="number" nme="idade" id="idade">

                <label for="renda">Renda</label>
                <input type="number" nme="renda" id="renda">

               <button type="submit"> Adicionar </button>
               <button type="reset"> Limpar formulário</button>
            </form>
        </div>

        <div id="div-lista-pessoas">

        </div>

    </div>
</body>
</html>
